name: Deploy Infrastructure and Application

on:
  push:
    branches:
      - main

jobs:
  terraform_apply:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    outputs:
      ec2_public_ip: ${{ steps.tf_output.outputs.ec2_public_ip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.4'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 IP Address
        id: tf_output
        run: echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  build_api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Test API
        run: npm run test:api

      - name: Build API
        run: npx nx build api --prod

      - name: Package Assets
        run: |
          mkdir -p dist/apps/api/assets/locales
          cp -r apps/api/src/assets/* dist/apps/api/assets/ || true
          cp -r apps/client/src/locales/* dist/apps/api/assets/locales/

      - name: Upload API Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api_build
          path: dist/apps/api

  build_client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Client
        run: npx nx build client --prod --localize=false

      - name: Package Client
        run: |
          for lang in ca de en es fr it ko nl pl pt tr uk zh; do mkdir -p dist/apps/client/$lang && cp dist/apps/client/index.html dist/apps/client/$lang/index.html; done
          tar -czvf client-build.tar.gz -C dist/apps/client .

      - name: Upload Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client_build
          path: client-build.tar.gz

  deploy_to_ec2:
    runs-on: ubuntu-latest
    needs: [terraform_apply, build_api, build_client]
    env:
      EC2_IP_ADDRESS: ${{ needs.terraform_apply.outputs.ec2_public_ip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API Artifact
        uses: actions/download-artifact@v4
        with:
          name: api_build
          path: dist/apps/api

      - name: Download Client Artifact
        uses: actions/download-artifact@v4
        with:
          name: client_build
          path: .

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $EC2_IP_ADDRESS >> ~/.ssh/known_hosts

      - name: Deploy Scripts
        run: |
          mkdir -p dist/apps/client
          tar -xzvf client-build.tar.gz -C dist/apps/client

          ssh ubuntu@$EC2_IP_ADDRESS "cloud-init status --wait" || (ssh ubuntu@$EC2_IP_ADDRESS "cat /var/log/cloud-init-output.log" && exit 1)
          ssh ubuntu@$EC2_IP_ADDRESS "mkdir -p /home/ubuntu/apps/api /home/ubuntu/apps/client"

          ssh ubuntu@$EC2_IP_ADDRESS "sudo apt-get update -y && sudo apt-get install -y nginx redis-server"
          ssh ubuntu@$EC2_IP_ADDRESS "sudo curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -"
          ssh ubuntu@$EC2_IP_ADDRESS "sudo apt-get install -y nodejs"
          ssh ubuntu@$EC2_IP_ADDRESS "sudo npm install -g pm2"

          rsync -avz --delete dist/apps/api/ ubuntu@$EC2_IP_ADDRESS:/home/ubuntu/apps/api
          rsync -avz --delete dist/apps/client/ ubuntu@$EC2_IP_ADDRESS:/home/ubuntu/apps/client
          rsync -avz prisma/ ubuntu@$EC2_IP_ADDRESS:/home/ubuntu/apps/api/prisma
          rsync -avz .config/ ubuntu@$EC2_IP_ADDRESS:/home/ubuntu/apps/api/.config

          ssh ubuntu@$EC2_IP_ADDRESS "sudo fallocate -l 1G /swapfile || true"
          ssh ubuntu@$EC2_IP_ADDRESS "sudo chmod 600 /swapfile || true"
          ssh ubuntu@$EC2_IP_ADDRESS "sudo mkswap /swapfile || true"
          ssh ubuntu@$EC2_IP_ADDRESS "sudo swapon /swapfile || true"

          ssh ubuntu@$EC2_IP_ADDRESS "cd /home/ubuntu/apps/api && npm install --production && npx --yes prisma@7.8.0 generate"
          ssh ubuntu@$EC2_IP_ADDRESS "ls -la /home/ubuntu/apps/api/node_modules/.prisma/client || echo 'PRISMA SILENTLY FAILED'"

          ssh ubuntu@$EC2_IP_ADDRESS "cp -r /home/ubuntu/apps/api/node_modules/.prisma/client/* /home/ubuntu/apps/api/node_modules/@prisma/client/"
          ssh ubuntu@$EC2_IP_ADDRESS "echo 'ACCESS_TOKEN_SALT=my_super_secret_salt_123' > /home/ubuntu/apps/api/.env"
          ssh ubuntu@$EC2_IP_ADDRESS "echo 'JWT_SECRET_KEY=my_super_secret_jwt_key_456' >> /home/ubuntu/apps/api/.env"
          ssh ubuntu@$EC2_IP_ADDRESS "echo 'DATABASE_URL=postgresql://ghostfolio:ghostfolio@127.0.0.1:5432/ghostfolio' >> /home/ubuntu/apps/api/.env"
          ssh ubuntu@$EC2_IP_ADDRESS "echo 'PORT=3000' >> /home/ubuntu/apps/api/.env"

          ssh ubuntu@$EC2_IP_ADDRESS "cat << 'EOF' > /home/ubuntu/apps/api/ecosystem.config.js
          module.exports = {
            apps: [{
              name: 'my-api',
              script: 'main.js',
              env: {
                ACCESS_TOKEN_SALT: 'my_super_secret_salt_123',
                JWT_SECRET_KEY: 'my_super_secret_jwt_key_456',
                DATABASE_URL: 'postgresql://ghostfolio:ghostfolio@127.0.0.1:5432/ghostfolio',
                PORT: 3000
              }
            }]
          };
          EOF"

          ssh ubuntu@$EC2_IP_ADDRESS "cd /home/ubuntu/apps/api && npx --yes prisma db push"
          ssh ubuntu@$EC2_IP_ADDRESS "cd /home/ubuntu/apps/api && pm2 delete my-api || true"
          ssh ubuntu@$EC2_IP_ADDRESS "cd /home/ubuntu/apps/api && pm2 start ecosystem.config.js"

          ssh ubuntu@$EC2_IP_ADDRESS "sudo systemctl status nginx --no-pager || true" 
          ssh ubuntu@$EC2_IP_ADDRESS "pm2 logs my-api --lines 20 --nostream"
