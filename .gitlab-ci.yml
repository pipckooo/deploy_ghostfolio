stages:
  - validate
  - plan
  - build
  - deploy

variables:
  TF_STATE_NAME: default

list_and_validate:
  stage: validate
  variables:
    TERRAFORM_IMAGE: "registry.gitlab.com/gitlab-org/terraform-images/releases/terraform:1.5.7"

    TFLINT_VERSION: "v0.61.0"
  image: $TERRAFORM_IMAGE
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  
      
  script:
    - gitlab-terraform init
    - gitlab-terraform fmt -check
    - gitlab-terraform validate

    - apk add --no-cache bash curl

    - curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
    - tflint --init
    - tflint --recursive

terraform_plan:
  stage: plan
  variables:
    TERRAFORM_IMAGE: "registry.gitlab.com/gitlab-org/terraform-images/releases/terraform:1.5.7"
  image: $TERRAFORM_IMAGE
  services:
    - name: docker:24.0.7-dind
      alias: docker
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  script:

    - gitlab-terraform init

    - gitlab-terraform plan
  artifacts:
    name: plan
    paths:
      - plan.cache

build_api:
  stage: build
  image: node:22-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script: 
    - npm install
    - npm run test:api
    - npx nx build api --prod
    
  artifacts:
    name : api_build
    paths:
      - dist/apps/api

build_client:
  stage: build
  image: node:22-alpine
  rules: 
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - npm install
    - npx nx build client --prod
    - tar -czvf client-build.tar.gz -C dist/apps/client .
  artifacts: 
    name : client_build
    paths:
      - client-build.tar.gz

deploy_to_ec2:
  stage: deploy
  image: alpine:3.23.3
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  dependencies:
    - build_api
    - build_client
  before_script:
    - apk add --no-cache openssh-client rsync tar
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    
  script:
    - mkdir -p dist/apps/client
    - tar -xzvf client-build.tar.gz -C dist/apps/client
    - rsync -avz --delete dist/apps/api/ ubuntu@$EC2_IP_ADDRESS:/home/ubuntu/apps/api
    - rsync -avz --delete dist/apps/client/ ubuntu@$EC2_IP_ADDRESS:/home/ubuntu/apps/client
    - ssh ubuntu@$EC2_IP_ADDRESS "cd /home/ubuntu/apps/api && npm install --production && pm2 restart my-api || pm2 start server.js --name my-api" 